<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Derek Neal</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            background-color: #000;
            border: 3px solid #00ff00;
            padding: 20px;
        }
        
        h1 {
            text-align: center;
            text-decoration: underline;
            color: #00ff00;
            font-size: 24px;
        }
        
        hr {
            border: 1px solid #00ff00;
            background-color: #00ff00;
        }
        
        .article-list {
            list-style-type: square;
            padding-left: 20px;
        }
        
        .article-list li {
            margin: 10px 0;
        }
        
        a {
            color: #00ff00;
            text-decoration: underline;
        }
        
        a:hover {
            background-color: #00ff00;
            color: #000;
        }
        
        .footer {
            text-align: center;
            margin-top: 30px;
            font-size: 12px;
            border-top: 1px solid #00ff00;
            padding-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>MY ARTICLES</h1>
        <hr>
        
        <ul class="article-list">
            <li><a href="https://example.com/article1">Article Title 1</a></li>
            <li><a href="https://example.com/article2">Article Title 2</a></li>
            <li><a href="https://example.com/article3">Article Title 3</a></li>
            <li><a href="https://example.com/article4">Article Title 4</a></li>
        </ul>
        
        <div class="footer">
            <p>Last updated: March 2026</p>
        </div>
    </div>
</body>
</html>
