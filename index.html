<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Articles</title>
    <style>
        body {
            background-color: #f5f5f5;
            color: #333;
            font-family: Georgia, serif;
            margin: 0;
            padding: 40px 20px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        h1 {
            font-size: 32px;
            font-weight: normal;
            margin: 0 0 40px 0;
            border-bottom: 1px solid #333;
            padding-bottom: 20px;
            letter-spacing: 2px;
        }
        
        ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        
        li {
            margin: 20px 0;
            line-height: 1.6;
        }
        
        a {
            color: #333;
            text-decoration: none;
            border-bottom: 1px solid #333;
        }
        
        a:hover {
            background-color: #fff;
        }
        
        .footer {
            margin-top: 60px;
            font-size: 12px;
            color: #666;
            border-top: 1px solid #ccc;
            padding-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Articles</h1>
        
        <ul>
            <li><a href="https://example.com/article1">Article Title 1</a></li>
            <li><a href="https://example.com/article2">Article Title 2</a></li>
            <li><a href="https://example.com/article3">Article Title 3</a></li>
            <li><a href="https://example.com/article4">Article Title 4</a></li>
        </ul>
        
        <div class="footer">
            <p>Last updated March 2026</p>
        </div>
    </div>
</body>
</html>
